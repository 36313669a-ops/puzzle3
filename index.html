<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>四季北觀心動大挑戰</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    h1 {
      margin: 15px 0;
    }

    #menu {
      padding: 20px;
    }

    .choice-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 400px;
      margin: auto;
    }

    .choice {
      border: 2px solid #ccc;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
      background: white;
    }

    .choice:hover {
      transform: scale(1.03);
      border-color: #333;
    }

    .choice img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    #game {
      display: none;
      padding: 20px;
    }

    #timer {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #d80000;
    }

    /* 遊戲區布局：左拼圖板 + 右碎片區 */
    #game-layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 15px;
      flex-wrap: wrap;
    }

    #puzzle-board {
      width: 90vw;
      max-width: 360px;
      height: 90vw;
      max-height: 360px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      background: #333;
      border-radius: 12px;
      padding: 5px;
      touch-action: none;
    }

    .cell {
      background: #111;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
      overflow: hidden;
    }

    .cell.fixed {
      border: 2px solid rgba(0,255,0,0.7);
    }

    .cell.empty {
      border: 2px dashed rgba(255,255,255,0.5);
    }

    .cell .piece {
      width: 100%;
      height: 100%;
      background-size: 300% 300%;
      border-radius: 8px;
    }

    /* 右側碎片區 */
    #pieces-area {
      width: 200px;
      max-width: 90vw;
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }

    #pieces-area h3 {
      margin: 5px 0 10px;
      font-size: 16px;
    }

    #pieces-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .floating-piece {
      width: 90px;
      height: 90px;
      border-radius: 10px;
      border: 2px solid rgba(0,0,0,0.2);
      background-size: 300% 300%;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .floating-piece:active {
      cursor: grabbing;
    }

    /* 成功對話框 */
    #success-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 80%;
      max-width: 360px;
      text-align: center;
    }

    .modal-content h2 {
      margin: 0 0 10px;
      color: green;
    }

    .modal-content button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .modal-content button:hover {
      background: #0056b3;
    }

    /* 左下角提示原圖 */
    #hint-image {
      display: none;
      position: fixed;
      left: 10px;
      bottom: 10px;
      width: 150px;
      height: auto;
      border-radius: 12px;
      border: 3px solid white;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
      z-index: 500;
    }

    @media (max-width: 480px) {
      .floating-piece {
        width: 80px;
        height: 80px;
      }
      #hint-image {
        width: 120px;
      }
    }
  </style>
</head>

<body>

  <h1>🧩 四季北觀心動大挑戰</h1>

  <!-- 選單 -->
  <div id="menu">
    <h2>請選擇一款拼圖</h2>
    <div class="choice-container">
      <div class="choice" onclick="startGame(0)">
        <img src="01.jpg" alt="拼圖1">
      </div>
      <div class="choice" onclick="startGame(1)">
        <img src="02.jpg" alt="拼圖2">
      </div>
      <div class="choice" onclick="startGame(2)">
        <img src="03.jpg" alt="拼圖3">
      </div>
      <div class="choice" onclick="startGame(3)">
        <img src="04.jpg" alt="拼圖4">
      </div>
    </div>
  </div>

  <!-- 遊戲畫面 -->
  <div id="game">
    <div id="timer">剩餘時間：60 秒</div>

    <div id="game-layout">
      <div id="puzzle-board"></div>

      <div id="pieces-area">
        <h3>拖曳拼圖碎片</h3>
        <div id="pieces-container"></div>
      </div>
    </div>
  </div>

  <!-- 左下角提示原圖 -->
  <img id="hint-image" src="" alt="提示原圖">

  <!-- 成功對話框 -->
  <div id="success-modal">
    <div class="modal-content">
      <h2>🎉 恭喜挑戰成功！</h2>
      <p>恭喜挑戰成功，請大聲唸出拼圖裡的景點名稱!</p>
      <button onclick="restartGame()">重來一次</button>
    </div>
  </div>

<script>
  const images = ["01.jpg", "02.jpg", "03.jpg", "04.jpg"];

  let selectedImage = "";
  let timer = 60;
  let countdownInterval = null;
  let firstMove = false;
  let gameFinished = false;

  let fixedIndexes = new Set();  // 固定 5 片
  let remainingIndexes = [];     // 要拼的 4 片

  let draggedPieceIndex = null;

  const menu = document.getElementById("menu");
  const game = document.getElementById("game");
  const board = document.getElementById("puzzle-board");
  const piecesContainer = document.getElementById("pieces-container");
  const timerText = document.getElementById("timer");
  const modal = document.getElementById("success-modal");
  const hintImage = document.getElementById("hint-image");

  function startGame(index) {
    selectedImage = images[index];

    menu.style.display = "none";
    game.style.display = "block";

    hintImage.src = selectedImage;
    hintImage.style.display = "none";

    createPuzzle();
  }

  function resetTimer() {
    firstMove = false;
    gameFinished = false;
    timer = 60;
    timerText.textContent = `剩餘時間：${timer} 秒`;

    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }

    hintImage.style.display = "none";
  }

  function startTimer() {
    if (countdownInterval) return;

    countdownInterval = setInterval(() => {
      if (gameFinished) return;

      timer--;
      timerText.textContent = `剩餘時間：${timer} 秒`;

      // 倒數超過20秒（剩40秒以下）顯示提示
      if (timer <= 40 && !gameFinished) {
        hintImage.style.display = "block";
      }

      if (timer <= 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;

        alert("時間到！挑戰失敗，請重試！");
        restartGame();
      }
    }, 1000);
  }

  function createPuzzle() {
    board.innerHTML = "";
    piecesContainer.innerHTML = "";
    fixedIndexes.clear();
    remainingIndexes = [];

    // 隨機選 5 片固定
    while (fixedIndexes.size < 5) {
      fixedIndexes.add(Math.floor(Math.random() * 9));
    }

    // 剩下 4 片就是玩家要拼的
    for (let i = 0; i < 9; i++) {
      if (!fixedIndexes.has(i)) remainingIndexes.push(i);
    }

    // 建立拼圖板（9格）
    for (let position = 0; position < 9; position++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.position = position;

      if (fixedIndexes.has(position)) {
        cell.classList.add("fixed");

        const piece = createPieceElement(position, false);
        cell.appendChild(piece);
      } else {
        cell.classList.add("empty");

        // 可放置區（drop）
        cell.addEventListener("dragover", (e) => e.preventDefault());
        cell.addEventListener("drop", dropToCell);

        // 手機 touch drop
        cell.addEventListener("touchend", touchDropToCell, {passive:false});
      }

      board.appendChild(cell);
    }

    // 右側碎片區：打亂 4 片
    const shuffledPieces = [...remainingIndexes].sort(() => Math.random() - 0.5);

    shuffledPieces.forEach(pieceIndex => {
      const piece = createFloatingPiece(pieceIndex);
      piecesContainer.appendChild(piece);
    });

    resetTimer();
  }

  // 建立拼圖圖片div（放在格子內）
  function createPieceElement(pieceIndex, isDraggable) {
    const piece = document.createElement("div");
    piece.classList.add("piece");
    piece.dataset.pieceIndex = pieceIndex;

    piece.style.backgroundImage = `url(${selectedImage})`;

    const x = pieceIndex % 3;
    const y = Math.floor(pieceIndex / 3);
    piece.style.backgroundPosition = `${x * 50}% ${y * 50}%`;

    if (isDraggable) {
      piece.draggable = true;
    }

    return piece;
  }

  // 建立右側可拖曳碎片
  function createFloatingPiece(pieceIndex) {
    const div = document.createElement("div");
    div.classList.add("floating-piece");
    div.dataset.pieceIndex = pieceIndex;

    div.style.backgroundImage = `url(${selectedImage})`;

    const x = pieceIndex % 3;
    const y = Math.floor(pieceIndex / 3);
    div.style.backgroundPosition = `${x * 50}% ${y * 50}%`;

    // 電腦拖曳
    div.draggable = true;
    div.addEventListener("dragstart", (e) => {
      if (!firstMove) {
        firstMove = true;
        startTimer();
      }
      draggedPieceIndex = div.dataset.pieceIndex;
    });

    // 手機 touch 拖曳（用點選方式）
    div.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (!firstMove) {
        firstMove = true;
        startTimer();
      }
      draggedPieceIndex = div.dataset.pieceIndex;
      div.style.border = "3px solid red";
    }, {passive:false});

    return div;
  }

  // 電腦 drop 到格子
  function dropToCell(e) {
    e.preventDefault();
    if (draggedPieceIndex === null) return;

    const cell = e.currentTarget;
    const position = parseInt(cell.dataset.position);

    // 格子已經有拼圖就不放
    if (cell.querySelector(".piece")) return;

    placePieceIntoCell(cell, position, parseInt(draggedPieceIndex));
    draggedPieceIndex = null;
  }

  // 手機 touch 放到格子
  function touchDropToCell(e) {
    e.preventDefault();
    if (draggedPieceIndex === null) return;

    const cell = e.currentTarget;
    const position = parseInt(cell.dataset.position);

    if (cell.querySelector(".piece")) return;

    placePieceIntoCell(cell, position, parseInt(draggedPieceIndex));
    draggedPieceIndex = null;

    // 取消紅框
    document.querySelectorAll(".floating-piece").forEach(p => {
      p.style.border = "2px solid rgba(0,0,0,0.2)";
    });
  }

  function placePieceIntoCell(cell, position, pieceIndex) {
    const piece = createPieceElement(pieceIndex, false);
    cell.appendChild(piece);

    // 從右側碎片區移除該碎片
    const floating = document.querySelector(`.floating-piece[data-piece-index="${pieceIndex}"]`);
    if (floating) floating.remove();

    checkWin();
  }

  function checkWin() {
    let correctCount = 0;
    const cells = document.querySelectorAll(".cell");

    cells.forEach(cell => {
      const position = parseInt(cell.dataset.position);
      const piece = cell.querySelector(".piece");

      if (piece) {
        const pieceIndex = parseInt(piece.dataset.pieceIndex);
        if (pieceIndex === position) {
          correctCount++;
        }
      }
    });

    if (correctCount === 9) {
      gameFinished = true;

      clearInterval(countdownInterval);
      countdownInterval = null;

      hintImage.style.display = "none";
      modal.style.display = "flex";
    }
  }

  function restartGame() {
    modal.style.display = "none";
    game.style.display = "none";
    menu.style.display = "block";

    resetTimer();
    board.innerHTML = "";
    piecesContainer.innerHTML = "";
  }
</script>

</body>
</html>
